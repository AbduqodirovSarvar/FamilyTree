services:
  db:
    image: postgres:16-alpine
    container_name: family-tree-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-FamilyTree}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host:container — host port shifted to 5433 to avoid clashing with
      # other Postgres instances. Inside the docker network the api still
      # connects to `db:5432`.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-FamilyTree}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - family-tree-net

  redis:
    image: redis:7-alpine
    container_name: family-tree-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host port 6380 to avoid clashing with a host-installed Redis;
      # internal port stays at 6379.
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - family-tree-net

  webapi:
    build:
      context: .
      dockerfile: WebApi/Dockerfile
    image: family-tree-api:latest
    container_name: family-tree-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # .NET reads `ConnectionStrings__Foo` as `ConnectionStrings:Foo`.
      ConnectionStrings__PostgreSqlConnection: "Server=db;Port=5432;Database=${POSTGRES_DB:-FamilyTree};User Id=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};"
      ConnectionStrings__Redis: "redis:6379"
      JWTConfiguration__Secret: ${JWT_SECRET:-c822c478-ea26-46bc-83af-ce145ae2c110}
      JWTConfiguration__ValidIssuer: ${JWT_ISSUER:-https://family-tree.uz}
      JWTConfiguration__ValidAudience: ${JWT_AUDIENCE:-https://family-tree.uz}
    ports:
      - "${WEBAPI_PORT:-5009}:8080"
    volumes:
      - uploaded-files:/app/wwwroot
    networks:
      - family-tree-net

networks:
  family-tree-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  uploaded-files:
