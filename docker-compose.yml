services:
  webapi:
    image: ${DOCKER_USERNAME:-yourusername}/family-tree-api:${IMAGE_TAG:-latest}
    # Lokal `docker compose up --build` qilganda shu yerdan build qiladi.
    # `docker compose pull && up -d` qilsa esa Docker Hub'dan tortib oladi (production).
    build:
      context: ./
      dockerfile: WebApi/Dockerfile
    container_name: family-tree-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # .NET reads `ConnectionStrings__Foo` as `ConnectionStrings:Foo`.
      # global-postgres / global-redis — `database` repo'dagi container nomlari.
      # Ulanish faqat global-app-network orqali ishlaydi.
      ConnectionStrings__PostgreSqlConnection: "Server=global-postgres;Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB kerak};User Id=${POSTGRES_USER:?POSTGRES_USER kerak};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD kerak};"
      ConnectionStrings__Redis: "global-redis:6379"
      JWTConfiguration__Secret: ${JWT_SECRET:?JWT_SECRET kerak}
      JWTConfiguration__ValidIssuer: ${JWT_ISSUER:-https://family-tree.uz}
      JWTConfiguration__ValidAudience: ${JWT_AUDIENCE:-https://family-tree.uz}
      # Email confirmation linki shu URL'dan boshlanadi: {App__FrontendBaseUrl}/confirm-email?token=...
      App__FrontendBaseUrl: ${APP_FRONTEND_BASE_URL:-https://admin.ft.svlab.uz}

      # Notification gateway — bir xil server ichidagi development-tg-bot
      # konteyneriga DNS orqali ulanadi. Kalit `.env`'dan keladi va
      # development-tg-bot tarafidagi API_KEY_FAMILYTREE bilan bir xil
      # bo'lishi shart, aks holda 401 qaytadi.
      NotificationGateway__BaseUrl: ${NOTIFICATION_GATEWAY_BASE_URL:-http://development-tg-bot:8080}
      NotificationGateway__ApiKey: ${NOTIFICATION_GATEWAY_API_KEY:?NOTIFICATION_GATEWAY_API_KEY kerak}
    ports:
      - "${WEBAPI_PORT:-5009}:8080"
    volumes:
      - uploaded-files:/app/wwwroot
    networks:
      - global-net

networks:
  # `database` repo yaratgan tashqi network. Uni avval ishga tushirish kerak:
  #   cd ../../database && docker compose up -d
  global-net:
    external: true
    name: global-app-network

volumes:
  uploaded-files:
